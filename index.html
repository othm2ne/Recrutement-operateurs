<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Recrutement opérateurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { "brand-primary": "#dc2626", "brand-dark": "#000000" },
            fontFamily: { sans: ["Manrope", "Tajawal", "sans-serif"] },
            animation: {
              enter: "enter 0.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) both",
              leave: "leave 0.3s ease-in forwards",
              shake: "shake 0.5s cubic-bezier(.36,.07,.19,.97) both",
              "slide-in-right":
                "slide-in-right 0.8s cubic-bezier(0.250, 0.460, 0.450, 0.940) 0.5s both",
              "card-enter":
                "card-enter 0.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) both",
            },
            keyframes: {
              enter: {
                "0%": { opacity: 0, transform: "translateY(20px)" },
                "100%": { opacity: 1, transform: "translateY(0)" },
              },
              leave: {
                "0%": { opacity: 1, transform: "translateY(0)" },
                "100%": { opacity: 0, transform: "translateY(-10px)" },
              },
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "10%, 30%, 50%, 70%, 90%": { transform: "translateX(-5px)" },
                "20%, 40%, 60%, 80%": { transform: "translateX(5px)" },
              },
              "slide-in-right": {
                "0%": { transform: "translateX(-100%)", opacity: "0" },
                "100%": { transform: "translateX(0)", opacity: "1" },
              },
              "card-enter": {
                "0%": {
                  transform: "translateY(20px) scale(0.98)",
                  opacity: "0",
                },
                "100%": { transform: "translateY(0) scale(1)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/index.css" />
    <script type="importmap">

        "imports": {
          "react/": "https://esm.sh/react@19.2.0/",

          "qrcode": "https://esm.sh/qrcode@1.5.3",
          "xlsx": "https://esm.sh/xlsx@0.18.5"
        }
      }
    </script>
    <script type="module" crossorigin src="/assets/index-BCi6vcQ6.js"></script>
